<div class="modal-header">
  <h5>{{ title }}</h5>
</div>
<div class="modal-body">
  <p>{{ message }}</p>
</div>
<div class="modal-footer">
  <button type="button" (click)="dismiss()">{{ cancelText }}</button>
  <button type="button" [class]="confirmClass" (click)="confirm()">{{ confirmText }}</button>
</div>
