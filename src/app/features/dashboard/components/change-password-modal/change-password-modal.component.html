<div class="modal-header">
  <h4 class="modal-title">Change Password</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="cancel()">✕</button>
</div>

<div class="modal-body">
  <div class="form-section">
    <label>Current Password *</label>
    <div class="password-input-wrapper">
      <input [type]="showCurrentPassword() ? 'text' : 'password'" [(ngModel)]="currentPassword" id="currentPassword" name="currentPassword" autocomplete="current-password" />
      <button type="button" class="eye-icon" (click)="toggleCurrentPasswordVisibility()">
        <i class="bi" [class.bi-eye]="!showCurrentPassword()" [class.bi-eye-slash]="showCurrentPassword()"></i>
      </button>
    </div>
  </div>

  <div class="form-section">
    <label>New Password *</label>
    <div class="password-input-wrapper">
      <input [type]="showNewPassword() ? 'text' : 'password'" [(ngModel)]="newPassword" id="newPassword" name="newPassword" autocomplete="new-password" />
      <button type="button" class="eye-icon" (click)="toggleNewPasswordVisibility()">
        <i class="bi" [class.bi-eye]="!showNewPassword()" [class.bi-eye-slash]="showNewPassword()"></i>
      </button>
    </div>
  </div>

  <div class="form-section">
    <label>Confirm New Password *</label>
    <div class="password-input-wrapper">
      <input [type]="showConfirmPassword() ? 'text' : 'password'" [(ngModel)]="confirmPassword" id="confirmPassword" name="confirmPassword" autocomplete="new-password" />
      <button type="button" class="eye-icon" (click)="toggleConfirmPasswordVisibility()">
        <i class="bi" [class.bi-eye]="!showConfirmPassword()" [class.bi-eye-slash]="showConfirmPassword()"></i>
      </button>
    </div>
  </div>

  <div class="password-requirements">
    <p><strong>Password Requirements:</strong></p>
    <ul>
      <li>Minimum 8 characters</li>
      <li>At least one uppercase letter</li>
      <li>At least one lowercase letter</li>
      <li>At least one number</li>
      <li>At least one special character</li>
    </ul>
  </div>
</div>

<div class="modal-footer">
  <button class="btn-cancel" (click)="cancel()">Cancel</button>
  <button class="btn-save" (click)="save()" [disabled]="!currentPassword || !newPassword || !confirmPassword">
    Save Change
  </button>
</div>
