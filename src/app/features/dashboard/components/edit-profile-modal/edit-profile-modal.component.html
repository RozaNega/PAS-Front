<div class="full-page-editor">
  <!-- Breadcrumbs -->
  <nav class="breadcrumb-nav">
    <i class="bi bi-house-door-fill home-icon"></i>
    <span class="separator">/</span>
    <span class="breadcrumb-item">Profile</span>
    <span class="separator">/</span>
    <span class="breadcrumb-item active">Edit Profile</span>
  </nav>

  <!-- Main Content Card -->
  <div class="editor-card">
    <div class="card-header">
      <div class="header-icon">
        <i class="bi bi-person-fill"></i>
      </div>
      <div class="header-text">
        <h2>EDIT PROFILE</h2>
        <p>Update your personal and professional information.</p>
      </div>
    </div>

    <div class="card-divider"></div>

    <div class="editor-body">
      <div class="editor-grid">
        <!-- Left: Photo Section -->
        <div class="photo-section">
          <label class="section-label">Profile Photo</label>
          <div class="photo-preview-wrapper">
            @if (photoPreview()) {
              <img [src]="photoPreview()!" alt="Profile preview" class="preview-img" />
            } @else {
              <div class="placeholder-img">
                <i class="bi bi-person-fill"></i>
              </div>
            }
          </div>

          @if (!isSelectingPhoto()) {
            <button class="btn-change-photo" (click)="isSelectingPhoto.set(true)">
              <i class="bi bi-upload"></i> Change Photo
            </button>
            <p class="photo-hint">JPG, PNG or GIF. Max size 2MB.</p>
          } @else {
            <div class="inline-upload-container">
              @if (!isCameraActive()) {
                <div class="method-toggles">
                  <button class="btn-method" (click)="fileInput.click()">
                    <i class="bi bi-cloud-arrow-up"></i> Upload
                  </button>
                  <button class="btn-method" (click)="startCamera()">
                    <i class="bi bi-camera"></i> Camera
                  </button>
                  <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;" />
                </div>
              } @else {
                <div class="inline-camera-view">
                  <video #videoElement autoplay playsinline></video>
                  <canvas #canvasElement style="display: none;"></canvas>
                  <button class="btn-capture" (click)="capturePhoto()">Capture</button>
                </div>
              }

              <div class="inline-actions">
                <button class="btn-cancel-upload" (click)="cancelUpload()">Cancel</button>
                <button class="btn-save-inline" (click)="isSelectingPhoto.set(false)" [disabled]="!selectedFile()">Save</button>
              </div>
            </div>
          }
        </div>

        <!-- Right: Form Section -->
        <div class="form-section">
          <div class="form-row">
            <div class="form-group">
              <label>Full Name <span>*</span></label>
              <input type="text" [(ngModel)]="profile.fullName" placeholder="John Doe" />
            </div>
            <div class="form-group">
              <label>Employee Code <span>*</span></label>
              <input type="text" [(ngModel)]="profile.employeeCode" placeholder="EMP-001" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Department <span>*</span></label>
              <div class="select-wrapper">
                <select [(ngModel)]="profile.department">
                  <option>IT Department</option>
                  <option>HR Department</option>
                  <option>Finance Department</option>
                </select>
                <i class="bi bi-chevron-down"></i>
              </div>
            </div>
            <div class="form-group">
              <label>Position <span>*</span></label>
              <input type="text" [(ngModel)]="profile.position" placeholder="Senior Developer" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email <span>*</span></label>
              <input type="email" [(ngModel)]="profile.email" placeholder="john.doe@afrocom.com" />
            </div>
            <div class="form-group">
              <label>Phone <span>*</span></label>
              <input type="tel" [(ngModel)]="profile.phone" placeholder="+251-911-234567" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Join Date <span>*</span></label>
              <div class="input-with-icon">
                <input type="text" [(ngModel)]="profile.joinDate" placeholder="01/15/2020" />
                <i class="bi bi-calendar3"></i>
              </div>
            </div>
            <div class="form-group">
              <label>Username <span>*</span></label>
              <input type="text" [(ngModel)]="profile.username" placeholder="Username" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>New Password</label>
              <div class="input-shell">
                <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="profile.password" placeholder="••••••••" />
                <button type="button" class="input-action" (click)="togglePasswordVisibility()">
                  <i class="bi" [class.bi-eye-slash]="showPassword()" [class.bi-eye]="!showPassword()"></i>
                </button>
              </div>
            </div>
            <div class="form-group">
              <!-- Spacer or empty group to maintain 2-column structure -->
            </div>
          </div>
        </div>
      </div>



    <!-- Card Footer -->
    <div class="card-footer-actions">
      <button class="btn-cancel" (click)="cancel()" [disabled]="loading()">Cancel</button>
      <button class="btn-save" (click)="save()" [disabled]="loading()">
        <i class="bi" [class.bi-floppy]="!loading()" [class.bi-hourglass-split]="loading()"></i>
        {{ loading() ? 'Updating...' : 'Save Changes' }}
      </button>
    </div>
  </div>
</div>
