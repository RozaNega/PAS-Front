<div class="modal-header">
  <h4 class="modal-title">Enable Two-Factor Authentication</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="cancel()">✕</button>
</div>

<div class="modal-body">
  @if (step() === 1) {
    <div class="setup-guide">
      <p class="guide-text">Choose how you want to receive your security codes:</p>
      
      <div class="method-options">
        <label class="method-card" [class.active]="method() === 'email'">
          <input type="radio" name="2faMethod" (click)="method.set('email')" [checked]="method() === 'email'" />
          <div class="method-icon"><i class="bi bi-envelope"></i></div>
          <div class="method-info">
            <strong>Email Address</strong>
            <span>Get codes sent to your inbox</span>
          </div>
        </label>
      </div>

      <div class="contact-section">
        <div class="contact-input">
          <label for="2fa-email">Email Address</label>
          <input id="2fa-email" type="email" [(ngModel)]="contactInfo" placeholder="your.email@example.com" />
        </div>
      </div>
    </div>
  } @else {
    <div class="verification-step">
      <div class="verify-icon" [class.pulse]="loading()"><i class="bi bi-shield-check"></i></div>
      <h3>Verify Identity</h3>
      <p>Please enter the 6-digit code sent to your email</p>
      
      <div class="code-input-wrapper">
        <input 
          type="text" 
          maxlength="6" 
          [(ngModel)]="verificationCode" 
          placeholder="000000" 
          class="modern-code-input"
          [disabled]="loading()"
          (keyup.enter)="submit()"
        />
      </div>
      
      <p class="resend-text">
        Didn't receive a code? 
        <button class="btn-link" (click)="resendCode()" [disabled]="loading()">Resend</button>
      </p>
    </div>
  }
</div>

<div class="modal-footer">
  @if (step() === 1) {
    <button class="btn-secondary" (click)="cancel()">Cancel</button>
    <button class="btn-primary" (click)="nextStep()" [disabled]="loading()">
      {{ loading() ? 'Sending...' : 'Continue' }}
    </button>
  } @else {
    <button class="btn-secondary" (click)="step.set(1)" [disabled]="loading()">Back</button>
    <button class="btn-primary" (click)="submit()" [disabled]="loading() || verificationCode().length !== 6">
      {{ loading() ? 'Verifying...' : 'Enable 2FA' }}
    </button>
  }
</div>
