<div class="approved-requests-container">
  <div class="page-header">
    <h1>Approved Requests</h1>
    <p class="subtitle">Requests approved and ready for issue</p>
  </div>

  <div class="requests-list">
    @for (req of requests(); track req.id) {
      <div class="request-card">
        <div class="request-header">
          <div class="request-number">{{ req.requestNumber }}</div>
          <div class="status-badge approved">Approved</div>
        </div>

        <h3 class="request-title">{{ req.description }}</h3>

        <div class="request-meta">
          <div class="meta-item">
            <i class="bi bi-flag"></i>
            <span>Priority: {{ req.priority }}</span>
          </div>
          @if (req.approvedDate) {
            <div class="meta-item">
              <i class="bi bi-check-circle"></i>
              <span>Approved: {{ req.approvedDate }}</span>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
