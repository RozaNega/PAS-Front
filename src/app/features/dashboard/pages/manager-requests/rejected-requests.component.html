<div class="rejected-requests-container">
  <div class="page-header">
    <h1>Rejected Requests</h1>
    <p class="subtitle">Requests that were not approved</p>
  </div>

  <div class="requests-list">
    @for (req of requests(); track req.id) {
      <div class="request-card">
        <div class="request-header">
          <div class="request-number">{{ req.requestNumber }}</div>
          <div class="status-badge rejected">Rejected</div>
        </div>

        <h3 class="request-title">{{ req.description }}</h3>

        <div class="rejection-reason">
          <i class="bi bi-exclamation-triangle"></i>
          <span><strong>Reason:</strong> {{ req.rejectionReason }}</span>
        </div>

        <div class="request-meta">
          <div class="meta-item">
            <i class="bi bi-flag"></i>
            <span>Priority: {{ req.priority }}</span>
          </div>
          <div class="meta-item">
            <i class="bi bi-x-circle"></i>
            <span>Rejected: {{ req.rejectedDate }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</div>
