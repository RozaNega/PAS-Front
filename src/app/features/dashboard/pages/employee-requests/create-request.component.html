<div class="create-request-container">
  <div class="page-header">
    <h1>Create New Service Request</h1>
    <p class="subtitle">Submit a new requisition request for items</p>
  </div>

  <div class="form-card">
    <form [formGroup]="requestForm" (ngSubmit)="submit()">
      <div class="form-section">
        <div class="section-header">
          <h3>Request Items</h3>
          <button type="button" class="btn-add" (click)="addItem()">
            <i class="bi bi-plus-lg"></i> Add Item
          </button>
        </div>

        <div formArrayName="items">
          <div *ngFor="let item of itemsArray.controls; let i = index" [formGroupName]="i" class="item-row">
            <div class="item-grid">
              <div class="form-field">
                <label [for]="'itemId-' + i">Item *</label>
                <select [id]="'itemId-' + i" formControlName="itemId">
                  <option value="">Select an item</option>
                  <option *ngFor="let option of items()" [value]="option.id">
                    {{ option.name }} ({{ option.sku }})
                  </option>
                </select>
                <div class="error-message" *ngIf="submitted() && itemsArray.at(i).get('itemId')?.errors?.['required']">
                  Item is required
                </div>
              </div>

              <div class="form-field">
                <label [for]="'quantity-' + i">Quantity *</label>
                <input
                  [id]="'quantity-' + i"
                  type="number"
                  formControlName="requestedQty"
                  min="1"
                  placeholder="Qty"
                />
                <div class="error-message" *ngIf="submitted() && itemsArray.at(i).get('requestedQty')?.errors?.['required']">
                  Qty is required
                </div>
              </div>

              <div class="form-field">
                <label [for]="'shelf-' + i">Preferred Shelf *</label>
                <select [id]="'shelf-' + i" formControlName="preferredShelfId">
                  <option value="">Select shelf</option>
                  <option *ngFor="let shelf of shelves()" [value]="shelf.id">
                    {{ shelf.shelfCode }} — {{ shelf.shelfName }} ({{ shelf.aisle || '—' }})
                  </option>
                </select>
                <div class="error-message" *ngIf="submitted() && itemsArray.at(i).get('preferredShelfId')?.errors?.['required']">
                  Shelf is required
                </div>
              </div>

              <div class="form-field full-width">
                <label [for]="'notes-' + i">Notes</label>
                <input
                  [id]="'notes-' + i"
                  type="text"
                  formControlName="notes"
                  placeholder="Additional notes for this item"
                />
              </div>
            </div>

            <button type="button" class="btn-remove" (click)="removeItem(i)" [disabled]="itemsArray.length === 1" title="Remove Item">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>General Remarks</h3>
        <div class="form-field">
          <label for="remarks">Remarks *</label>
          <textarea
            id="remarks"
            formControlName="remarks"
            rows="3"
            placeholder="Enter any general remarks for this service request"
          ></textarea>
          <div class="error-message" *ngIf="submitted() && requestForm.get('remarks')?.errors?.['required']">
            Remarks are required
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading()">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          <span *ngIf="loading()">
            <i class="bi bi-arrow-repeat spin"></i> Submitting...
          </span>
          <span *ngIf="!loading()">Submit Service Request</span>
        </button>
      </div>
    </form>
  </div>
</div>
