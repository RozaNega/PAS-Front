<div class="disposal-reports-container">
  <div class="page-header"><h1>Disposal Reports</h1><p class="subtitle">Asset disposal reports</p></div>
  <div class="reports-list">
    @for (report of reports(); track report.id) {
      <div class="report-card">
        <div class="report-header"><div class="report-name">{{ report.reportName }}</div></div>
        <div class="report-details">
          <div class="detail-row"><span class="label">Generated:</span><span class="value">{{ report.generatedDate }}</span></div>
          <div class="detail-row"><span class="label">Total Disposals:</span><span class="value">{{ report.totalDisposals }}</span></div>
          <div class="detail-row"><span class="label">Total Value:</span><span class="value">${{ report.totalValue.toLocaleString() }}</span></div>
          <div class="detail-row"><span class="label">Approved:</span><span class="value">{{ report.approvedDisposals }}</span></div>
        </div>
        <div class="report-actions"><button class="btn btn-secondary">View</button><button class="btn btn-primary">Download</button></div>
      </div>
    }
  </div>
</div>
