<div class="inspection-reports-container">
  <div class="page-header"><h1>Inspection Reports</h1><p class="subtitle">Goods inspection reports</p></div>
  <div class="reports-list">
    @for (report of reports(); track report.id) {
      <div class="report-card">
        <div class="report-header"><div class="report-name">{{ report.reportName }}</div></div>
        <div class="report-details">
          <div class="detail-row"><span class="label">Generated:</span><span class="value">{{ report.generatedDate }}</span></div>
          <div class="detail-row"><span class="label">Total Inspections:</span><span class="value">{{ report.totalInspections }}</span></div>
          <div class="detail-row"><span class="label">Passed:</span><span class="value">{{ report.passedInspections }}</span></div>
          <div class="detail-row"><span class="label">Failed:</span><span class="value">{{ report.failedInspections }}</span></div>
        </div>
        <div class="report-actions"><button class="btn btn-secondary">View</button><button class="btn btn-primary">Download</button></div>
      </div>
    }
  </div>
</div>
