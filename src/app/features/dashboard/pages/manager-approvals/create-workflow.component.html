<div class="create-workflow-container">
  <div class="page-header">
    <h1>Create Workflow</h1>
    <p class="subtitle">Create a new approval workflow</p>
  </div>

  <div class="form-card">
    <form [formGroup]="workflowForm" (ngSubmit)="submit()">
      <div class="form-field">
        <label for="name">Workflow Name *</label>
        <input id="name" type="text" formControlName="name" placeholder="Enter workflow name" />
        <div class="error-message" *ngIf="submitted() && workflowForm.get('name')?.errors?.['required']">Name is required</div>
      </div>

      <div class="form-field">
        <label for="description">Description *</label>
        <textarea id="description" formControlName="description" rows="3" placeholder="Describe the workflow"></textarea>
        <div class="error-message" *ngIf="submitted() && workflowForm.get('description')?.errors?.['required']">Description is required</div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label for="minAmount">Min Amount *</label>
          <input id="minAmount" type="number" formControlName="minAmount" placeholder="0" />
        </div>
        <div class="form-field">
          <label for="maxAmount">Max Amount *</label>
          <input id="maxAmount" type="number" formControlName="maxAmount" placeholder="0" />
        </div>
      </div>

      <div class="form-field">
        <label for="approverLevels">Approver Levels *</label>
        <input id="approverLevels" type="number" formControlName="approverLevels" placeholder="1" min="1" />
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          <span *ngIf="loading()">Creating...</span>
          <span *ngIf="!loading()">Create Workflow</span>
        </button>
      </div>
    </form>
  </div>
</div>
