<div class="all-workflows-container">
  <div class="page-header">
    <h1>All Workflows</h1>
    <p class="subtitle">View all approval workflows</p>
  </div>

  <div class="workflows-list">
    @for (workflow of workflows(); track workflow.id) {
      <div class="workflow-card">
        <div class="workflow-header">
          <div class="workflow-name">{{ workflow.name }}</div>
          <div class="status-badge" [class.active]="workflow.status === 'Active'">{{ workflow.status }}</div>
        </div>
        <p class="description">{{ workflow.description }}</p>
        <div class="workflow-details">
          <div class="detail-row"><span class="label">Approvers:</span><span class="value">{{ workflow.approverCount }}</span></div>
          <div class="detail-row"><span class="label">Created:</span><span class="value">{{ workflow.createdDate }}</span></div>
        </div>
      </div>
    }
  </div>
</div>
