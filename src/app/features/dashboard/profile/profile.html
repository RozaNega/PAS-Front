<section class="profile-card">
  <header class="profile-header">
    <i class="bi bi-person-circle" aria-hidden="true"></i>
    <div>
      <h2>User Profile</h2>
      <p>Account information available in this session.</p>
    </div>
  </header>

  <dl class="profile-list" aria-label="User profile details">
    <div>
      <dt>Name</dt>
      <dd>{{ profileName }}</dd>
    </div>
    <div>
      <dt>Email</dt>
      <dd>{{ profileEmail }}</dd>
    </div>
    <div>
      <dt>Roles</dt>
      <dd>{{ profileRoles }}</dd>
    </div>
  </dl>
</section>
